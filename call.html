<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamada de Vídeo - WhatsApp</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/call.css">
    
    <!-- Theme (light/dark) -->
    <script src="js/themeInit.js" defer></script>

</head>
<body>
    <div class="call-container">
        <div class="call-header">
            <div>
                <h5><i class="bi bi-camera-video me-2"></i>Chamada WhatsApp</h5>
                <small class="text-muted" id="call-info"></small>
            </div>
            <span class="call-status connecting" id="call-status">Conectando...</span>
        </div>
        
        <!-- Tela de Aguardo -->
        <div class="waiting-screen" id="waiting-screen">
            <i class="bi bi-hourglass-split"></i>
            <h3>Aguarde...</h3>
            <p>Preparando a chamada e solicitando permissões de mídia</p>
            <button class="btn btn-primary btn-lg d-none" id="answer-btn">
                <i class="bi bi-telephone-fill me-2"></i>Atender Chamada
            </button>
        </div>
        
        <!-- Tela de Erro -->
        <div class="error-screen" id="error-screen">
            <i class="bi bi-exclamation-triangle"></i>
            <h3>Erro na Chamada</h3>
            <p id="error-message">Não foi possível estabelecer a conexão</p>
            <button class="btn btn-secondary" onclick="window.close()">Fechar</button>
        </div>
        
        <!-- Container de Vídeo -->
        <div class="video-container d-none" id="video-container">
            <video id="remote-video" autoplay playsinline></video>
            <video id="local-video" autoplay playsinline muted></video>
            
            <div class="call-timer" id="call-timer">00:00</div>
            
            <div class="call-controls">
                <button class="control-btn mute" id="mute-btn" title="Mudo">
                    <i class="bi bi-mic-fill"></i>
                </button>
                
                <button class="control-btn video" id="video-btn" title="Câmera">
                    <i class="bi bi-camera-video-fill"></i>
                </button>
                
                <button class="control-btn end" id="end-btn" title="Desligar">
                    <i class="bi bi-telephone-x-fill"></i>
                </button>
            </div>
        </div>
    </div>
    
    <!-- Firebase SDK -->
        <script>
            window.__APP_BUILD__ = '2026-04-24.18-40-27';
        </script>
        <script src="js/swRegistration.js?v=2026-04-24.18-40-27" defer></script>
    <script type="module" src="js/pages/callPageInit.js"></script>
</body>
</html>
