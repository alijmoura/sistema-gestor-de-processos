<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Admin - AJSM Tech</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/themeInit.js" defer></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-body border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-semibold" href="admin.html">
        <i class="bi bi-building-gear me-2"></i>Painel SaaS
      </a>
      <div class="d-flex align-items-center gap-2">
        <span id="admin-user-email" class="small text-muted"></span>
        <button id="admin-logout-btn" type="button" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-box-arrow-right me-1"></i>Sair
        </button>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <div id="admin-alert"></div>

    <div class="row g-3 mb-4">
      <div class="col-12 col-lg-3">
        <div class="card h-100">
          <div class="card-body">
            <div class="text-muted small">Empresas</div>
            <div id="metric-companies" class="fs-3 fw-semibold">0</div>
          </div>
        </div>
      </div>
      <div class="col-12 col-lg-3">
        <div class="card h-100">
          <div class="card-body">
            <div class="text-muted small">Ativas/Trial</div>
            <div id="metric-active" class="fs-3 fw-semibold">0</div>
          </div>
        </div>
      </div>
      <div class="col-12 col-lg-3">
        <div class="card h-100">
          <div class="card-body">
            <div class="text-muted small">Suspensas</div>
            <div id="metric-suspended" class="fs-3 fw-semibold">0</div>
          </div>
        </div>
      </div>
      <div class="col-12 col-lg-3">
        <div class="card h-100">
          <div class="card-body">
            <div class="text-muted small">Usuários vinculados</div>
            <div id="metric-memberships" class="fs-3 fw-semibold">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <section class="col-12 col-xl-8">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <h1 class="h4 mb-0">Empresas</h1>
          <button id="new-company-btn" type="button" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nova empresa
          </button>
        </div>
        <div class="table-responsive border rounded">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Empresa</th>
                <th>Subdomínio</th>
                <th>Status</th>
                <th>Plano</th>
                <th>Assinatura</th>
                <th class="text-end">Ações</th>
              </tr>
            </thead>
            <tbody id="companies-table-body">
              <tr><td colspan="6" class="text-center text-muted py-4">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <aside class="col-12 col-xl-4">
        <div class="card mb-4">
          <div class="card-header fw-semibold">Vincular usuário</div>
          <div class="card-body">
            <form id="membership-form" class="needs-validation" novalidate>
              <div class="mb-3">
                <label for="membership-email" class="form-label">E-mail</label>
                <input id="membership-email" type="email" class="form-control" required>
                <div class="invalid-feedback">Informe um e-mail válido.</div>
              </div>
              <div class="mb-3">
                <label for="membership-company" class="form-label">Empresa</label>
                <select id="membership-company" class="form-select" required></select>
                <div class="invalid-feedback">Selecione a empresa.</div>
              </div>
              <div class="mb-3">
                <label for="membership-role" class="form-label">Perfil</label>
                <select id="membership-role" class="form-select" required>
                  <option value="empresa_admin">Administrador da empresa</option>
                  <option value="admin">Admin</option>
                  <option value="manager">Gerente</option>
                  <option value="analyst">Analista</option>
                  <option value="viewer">Visualizador</option>
                </select>
              </div>
              <button type="submit" class="btn btn-outline-primary w-100">
                <i class="bi bi-person-check me-1"></i>Vincular
              </button>
            </form>
          </div>
        </div>

        <div class="card">
          <div class="card-header fw-semibold">Cobrança Mercado Pago</div>
          <div class="card-body">
            <form id="billing-form" class="needs-validation" novalidate>
              <div class="mb-3">
                <label for="billing-company" class="form-label">Empresa</label>
                <select id="billing-company" class="form-select" required></select>
              </div>
              <div class="mb-3">
                <label for="billing-amount" class="form-label">Valor mensal</label>
                <input id="billing-amount" type="number" min="1" step="0.01" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-success w-100">
                <i class="bi bi-credit-card me-1"></i>Gerar cobrança
              </button>
            </form>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <div class="modal fade" id="company-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
      <div class="modal-content">
        <form id="company-form" class="needs-validation" novalidate>
          <div class="modal-header">
            <h2 class="modal-title h5">Empresa</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
          </div>
          <div class="modal-body">
            <input id="company-id" type="hidden">
            <div class="row g-3">
              <div class="col-12 col-md-8">
                <label for="company-name" class="form-label">Nome</label>
                <input id="company-name" class="form-control" required maxlength="120">
                <div class="invalid-feedback">Informe o nome.</div>
              </div>
              <div class="col-12 col-md-4">
                <label for="company-slug" class="form-label">Slug</label>
                <input id="company-slug" class="form-control" required pattern="[a-z0-9-]{2,63}" maxlength="63">
                <div class="invalid-feedback">Use letras minúsculas, números e hífen.</div>
              </div>
              <div class="col-12 col-md-4">
                <label for="company-status" class="form-label">Status</label>
                <select id="company-status" class="form-select">
                  <option value="trial">Trial</option>
                  <option value="ativo">Ativo</option>
                  <option value="pagamento_pendente">Pagamento pendente</option>
                  <option value="suspenso">Suspenso</option>
                  <option value="cancelado">Cancelado</option>
                </select>
              </div>
              <div class="col-12 col-md-4">
                <label for="company-plan" class="form-label">Plano</label>
                <select id="company-plan" class="form-select">
                  <option value="starter">Starter</option>
                  <option value="professional">Professional</option>
                  <option value="enterprise">Enterprise</option>
                </select>
              </div>
              <div class="col-12 col-md-4">
                <label for="company-users-limit" class="form-label">Limite de usuários</label>
                <input id="company-users-limit" type="number" min="1" class="form-control" value="10">
              </div>
              <div class="col-12 col-md-4">
                <label for="company-process-limit" class="form-label">Limite de processos</label>
                <input id="company-process-limit" type="number" min="1" class="form-control" value="5000">
              </div>
              <div class="col-12 col-md-4">
                <label for="company-whatsapp" class="form-label">WhatsApp</label>
                <select id="company-whatsapp" class="form-select">
                  <option value="true">Habilitado</option>
                  <option value="false">Desabilitado</option>
                </select>
              </div>
              <div class="col-12 col-md-4">
                <label for="company-billing-status" class="form-label">Status cobrança</label>
                <select id="company-billing-status" class="form-select">
                  <option value="manual">Manual</option>
                  <option value="pending">Pendente</option>
                  <option value="active">Ativa</option>
                  <option value="overdue">Vencida</option>
                  <option value="cancelled">Cancelada</option>
                </select>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-functions-compat.js"></script>
  <script type="module" src="js/pages/adminSaasPage.js"></script>
</body>
</html>
